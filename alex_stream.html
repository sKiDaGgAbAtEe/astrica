<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>AstricAlex · Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b0813;
      --gold:        rgba(232,200,122,1);
      --gold-dim:    rgba(232,200,122,0.18);
      --gold-glow:   rgba(232,200,122,0.38);
      --ember:       rgba(74,29,110,0.55);
      --glass:       rgba(11,8,19,0.82);
      --border:      rgba(184,146,216,0.10);
      --border2:     rgba(184,146,216,0.18);
      --text:        rgba(255,238,250,0.90);
      --muted:       rgba(255,220,240,0.38);
      --scroll:      rgba(184,146,216,0.08);
      --oryc:        #9b7fd4;
      --oryc-dim:    rgba(155,127,212,0.12);
      --oryc-border: rgba(155,127,212,0.28);
      --oryc-glow:   rgba(155,127,212,0.4);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Jost', sans-serif;
      overflow: hidden; color: var(--text);
    }

    /* ── BACKGROUND ── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 30% 20%, #2a0845 0%, #0d0618 40%, #0b0813 70%, #18051a 100%);
    }
    #bg::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 65% 75%, rgba(196,102,122,0.25) 0%, transparent 55%);
    }
    #bg::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 25% 50%, rgba(74,29,110,0.35) 0%, transparent 60%);
    }

    #root {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
    }

    /* ── HEADER ── */
    #header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px 8px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(11,8,19,0.80);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    #back-btn {
      background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.09);
      color: var(--muted); font-family: 'Jost', sans-serif;
      font-size: 9px; letter-spacing: 1.6px; text-transform: uppercase;
      padding: 4px 12px; border-radius: 20px; cursor: pointer;
      transition: background 0.2s, color 0.2s; flex-shrink: 0;
    }
    #back-btn:hover { background: rgba(255,255,255,0.09); color: #fff; }

    #header-title {
      font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(14px, 3vw, 20px);
      font-weight: 600; letter-spacing: 4px; color: #fff;
      text-shadow: 0 0 22px rgba(184,146,216,0.45); flex: 1;
    }



    #live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(196,102,122,0.18); border: 1px solid rgba(220,100,140,0.35);
      border-radius: 20px; padding: 4px 10px;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #f090b0;
      animation: livepulse 1.8s ease-in-out infinite; flex-shrink: 0;
    }
    #live-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:#c45070; }
    @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── BODY ── */
    #body { flex: 1; display: flex; overflow: hidden; }

    /* ── STREAM ── */
    #stream-col {
      flex: 1; display: flex; flex-direction: column;
      padding: 10px 6px 10px 10px; min-width: 0;
    }
    #stream-wrap {
      flex: 1; border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border); background: #000; position: relative;
    }
    #stream-wrap > div { width: 100%; height: 100%; }

    /* ── CHAT COL ── */
    #chat-col {
      width: clamp(240px, 28vw, 340px); flex-shrink: 0;
      display: flex; flex-direction: column;
      padding: 10px 10px 10px 6px;
    }

    /* ── CHAT BOX ── */
    #chat-box {
      flex: 1; display: flex; flex-direction: column;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 14px 14px 0 0; overflow: hidden;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }

    /* chat header row */
    #chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px 7px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .ch-label {
      font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted);
    }
    #chat-header-right { display: flex; align-items: center; gap: 8px; }

    /* connection dot */
    #conn-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #333; transition: background 0.4s;
    }
    #conn-dot.connected { background: #3ecf6a; box-shadow: 0 0 6px #3ecf6a; }
    #conn-dot.error     { background: #e04040; }

    /* connect button in header */
    #connect-btn {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; color: var(--muted);
      font-family: 'Jost', sans-serif; font-size: 8px; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 3px 9px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    #connect-btn:hover { border-color: rgba(184,146,216,0.35); color: rgba(200,170,235,0.85); }
    #connect-btn.connected-state {
      border-color: rgba(62,207,106,0.25); color: rgba(62,207,106,0.7);
      background: rgba(62,207,106,0.05);
    }

    /* messages */
    #chat-messages {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 8px 10px; display: flex; flex-direction: column; gap: 4px;
      scrollbar-width: thin; scrollbar-color: var(--scroll) transparent;
    }
    #chat-messages::-webkit-scrollbar { width: 2px; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 4px; }

    .chat-msg {
      font-size: 12.5px; line-height: 1.55; word-break: break-word;
      animation: msgIn 0.2s ease both;
    }
    @keyframes msgIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

    .chat-msg .badge  { font-size: 10px; margin-right: 2px; vertical-align: middle; }
    .chat-msg .name   { font-weight: 500; font-size: 11.5px; letter-spacing: 0.2px; margin-right: 3px; }
    .chat-msg .body   { color: rgba(255,255,255,0.76); }
    .chat-msg img.emote {
      height: 22px; vertical-align: middle; margin: 0 1px; display: inline-block;
      transition: transform 0.15s; cursor: default;
    }
    .chat-msg img.emote:hover { transform: scale(1.7); z-index: 20; position: relative; }



    /* highlighted (mentions channel name) */
    .chat-msg.highlight {
      background: rgba(196,102,122,0.07); border-left: 2px solid rgba(196,102,122,0.35);
      border-radius: 6px; padding: 3px 8px;
    }

    /* sub/raid events */
    .chat-event {
      background: rgba(62,207,106,0.07); border: 1px solid rgba(62,207,106,0.18);
      border-radius: 8px; padding: 5px 10px; font-size: 11.5px;
      color: rgba(100,220,140,0.9); animation: msgIn 0.2s ease both;
    }

    /* system */
    .chat-system {
      font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.18); text-align: center; padding: 3px 0;
      animation: msgIn 0.2s ease both;
    }



    /* ── EMOTE PICKER ── */
    #emote-picker {
      position: absolute; bottom: 52px; right: 10px;
      width: 272px; max-height: 190px;
      background: rgba(11,8,19,0.97); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; z-index: 50;
      display: none; flex-direction: column;
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    #emote-picker.open { display: flex; }
    #emote-search {
      padding: 7px 12px; background: transparent;
      border: none; border-bottom: 1px solid var(--border);
      color: #fff; font-size: 11px; outline: none; font-family: 'Jost', sans-serif;
    }
    #emote-grid {
      display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 10px;
      overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--scroll) transparent;
    }
    #emote-grid::-webkit-scrollbar { width: 2px; }
    .ep-emote {
      width: 30px; height: 30px; cursor: pointer; border-radius: 6px; padding: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, transform 0.1s;
    }
    .ep-emote:hover { background: rgba(255,255,255,0.08); transform: scale(1.2); }
    .ep-emote img   { height: 24px; width: auto; }

    /* ── INPUT ROW ── */
    #chat-input-wrap {
      display: flex; gap: 7px; align-items: center; padding: 8px 10px;
      background: var(--glass); border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 14px 14px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); flex-shrink: 0;
    }
    #emote-btn {
      background: transparent; border: none; color: var(--muted); font-size: 15px;
      cursor: pointer; flex-shrink: 0; padding: 2px; border-radius: 5px; transition: color 0.2s;
    }
    #emote-btn:hover { color: #fff; }
    #chat-input {
      flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px; padding: 6px 13px; color: #fff;
      font-family: 'Jost', sans-serif; font-size: 12px; outline: none; transition: border-color 0.2s;
    }
    #chat-input::placeholder { color: rgba(255,255,255,0.2); }
    #chat-input:focus        { border-color: rgba(184,146,216,0.35); }
    #chat-input:disabled     { opacity: 0.35; cursor: not-allowed; }
    #send-btn {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: rgba(196,102,122,0.18); border: 1px solid rgba(196,102,122,0.3);
      color: rgba(220,150,170,0.9); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    #send-btn:hover:not(:disabled) { background: rgba(196,102,122,0.28); }
    #send-btn:active { transform: scale(0.9); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── AUTH DRAWER ── */
    #auth-drawer {
      position: absolute; bottom: 0; right: 0;
      width: clamp(240px, 28vw, 340px);
      background: rgba(11,8,19,0.98); border: 1px solid var(--border2);
      border-bottom: none; border-radius: 14px 14px 0 0;
      padding: 16px 16px 0;
      transform: translateY(100%); transition: transform 0.3s ease;
      z-index: 30; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
    }
    #auth-drawer.open { transform: translateY(0); }

    #auth-drawer h3 {
      font-family: 'Cormorant Garamond', Georgia, serif; font-size: 11px; letter-spacing: 2.5px;
      color: rgba(184,146,216,0.85); margin-bottom: 10px; text-transform: uppercase;
    }
    #auth-drawer p { font-size: 10.5px; color: var(--muted); line-height: 1.65; margin-bottom: 10px; }

    .auth-field { margin-bottom: 8px; }
    .auth-field label {
      display: block; font-size: 8.5px; letter-spacing: 1.8px; text-transform: uppercase;
      color: rgba(255,255,255,0.25); margin-bottom: 4px;
    }
    .auth-field input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 11px; color: #fff;
      font-family: 'Jost', sans-serif; font-size: 11.5px; outline: none;
      transition: border-color 0.2s; box-sizing: border-box;
    }
    .auth-field input:focus { border-color: rgba(255,180,60,0.3); }
    .auth-field input::placeholder { color: rgba(255,255,255,0.18); }

    .auth-actions { display: flex; gap: 8px; padding: 10px 0 14px; }
    .auth-save-btn {
      flex: 1; padding: 8px; border-radius: 20px; cursor: pointer;
      font-family: 'Jost', sans-serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      background: rgba(184,146,216,0.15); border: 1px solid rgba(184,146,216,0.35);
      color: rgba(210,185,245,0.9); transition: all 0.2s;
    }
    .auth-save-btn:hover { background: rgba(184,146,216,0.28); }
    .auth-cancel-btn {
      flex: 1; padding: 8px; border-radius: 20px; cursor: pointer;
      font-family: 'Jost', sans-serif; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      background: transparent; border: 1px solid rgba(255,255,255,0.09);
      color: var(--muted); transition: all 0.2s;
    }
    .auth-cancel-btn:hover { border-color: rgba(255,255,255,0.2); color: #fff; }
    .auth-link-row { font-size: 9.5px; color: rgba(255,255,255,0.22); text-align: center; padding-bottom: 12px; }
    .auth-link-row a { color: rgba(184,146,216,0.6); text-decoration: none; }
    .auth-link-row a:hover { color: rgba(184,146,216,0.9); }

    /* disconnect link */
    #disconnect-btn {
      font-size: 8.5px; letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,100,100,0.4); background: none; border: none;
      cursor: pointer; padding: 0; transition: color 0.2s; display: none;
    }
    #disconnect-btn:hover { color: rgba(255,100,100,0.7); }
    #disconnect-btn.show  { display: inline; }

    @media (max-width: 600px) {
      #body { flex-direction: column; }
      #stream-col { padding: 8px 8px 4px; }
      #chat-col { width: 100%; padding: 0 8px 8px; flex: 0 0 48%; }
      #auth-drawer { width: 100%; }
      #emote-picker { right: 8px; width: calc(100vw - 16px); }
    }
  </style>
</head>
<body>
<div id="bg"></div>

<div id="root">
  <!-- HEADER -->
  <div id="header">
    <button id="back-btn" onclick="window.parent.postMessage({type:'alex-nav',tab:'home'},'*')">‹ Back</button>
    <div id="header-title">AstricAlex</div>
    <div id="live-badge">Live</div>
  </div>


  <!-- BODY -->  <div id="body">

    <!-- STREAM PLAYER -->
    <div id="stream-col">
      <div id="stream-wrap"></div>
    </div>

    <!-- CHAT -->
    <div id="chat-col">
      <div id="chat-box">
        <div id="chat-header">
          <span class="ch-label">Chat</span>
          <div id="chat-header-right">
            <button id="disconnect-btn">disconnect</button>
            <div id="conn-dot" title="Not connected"></div>
            <button id="connect-btn">Connect</button>
          </div>
        </div>
        <div id="chat-messages"></div>
      </div>

      <!-- emote picker -->
      <div id="emote-picker">
        <input id="emote-search" type="text" placeholder="Search emotes…" autocomplete="off" />
        <div id="emote-grid"></div>
      </div>

      <!-- input -->
      <div id="chat-input-wrap">
        <button id="emote-btn" title="Emotes">😄</button>
        <input id="chat-input" type="text" placeholder="Join the stream…" maxlength="400" autocomplete="off" disabled />
        <button id="send-btn" title="Send" disabled>➤</button>
      </div>

      <!-- auth drawer — slides up from bottom -->
      <div id="auth-drawer">
        <h3>Connect to Chat</h3>
        <p>Sign in with Twitch to send messages and interact with chat.</p>
        <div class="auth-actions">
          <button class="auth-save-btn" id="auth-twitch-btn" onclick="twitchOAuthLogin()">
            Sign in with Twitch
          </button>
          <button class="auth-cancel-btn" id="auth-cancel">Cancel</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://embed.twitch.tv/embed/v1.js"></script>
<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const CHANNEL    = 'astricalex';
const PARENT     = ['skidaggabatee.github.io', 'localhost', '127.0.0.1'];
const COCREATE_URL = 'https://cocreate-production.up.railway.app';

const MAX_MSGS     = 200;

/* ═══════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════ */
const COLORS = ['#e08040','#70c090','#7090e0','#c070c0','#60c0b0','#e0a040','#80c060','#c06070'];
const userColors = {};
function colorFor(name) {
  if (!userColors[name]) {
    let h = 0; for (const c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
    userColors[name] = COLORS[h % COLORS.length];
  }
  return userColors[name];
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════
   7TV EMOTES
═══════════════════════════════════════════ */
const emoteMap  = {};
const emoteList = [];

async function load7TV() {
  try {
    const res = await fetch(`https://7tv.io/v3/users/twitch/${CHANNEL}`);
    if (res.ok) {
      const data = await res.json();
      (data?.emote_set?.emotes ?? []).forEach(e => {
        const url = `https://cdn.7tv.app/emote/${e.id}/1x.webp`;
        emoteMap[e.name] = url; emoteList.push({ name: e.name, url });
      });
    }
  } catch {}
  try {
    const res = await fetch('https://7tv.io/v3/emote-sets/global');
    if (res.ok) {
      const data = await res.json();
      (data?.emotes ?? []).forEach(e => {
        const url = `https://cdn.7tv.app/emote/${e.id}/1x.webp`;
        if (!emoteMap[e.name]) { emoteMap[e.name] = url; emoteList.push({ name: e.name, url }); }
      });
    }
  } catch {}
  buildEmoteGrid(emoteList);
}

function buildEmoteGrid(list) {
  const grid = document.getElementById('emote-grid');
  grid.innerHTML = '';
  list.forEach(({ name, url }) => {
    const el = document.createElement('div');
    el.className = 'ep-emote'; el.title = name;
    el.innerHTML = `<img src="${url}" alt="${name}" loading="lazy" />`;
    el.addEventListener('click', () => {
      const inp = document.getElementById('chat-input');
      inp.value = (inp.value.trimEnd() + ' ' + name + ' ').trimStart();
      inp.focus(); closeEmotePicker();
    });
    grid.appendChild(el);
  });
}

document.getElementById('emote-search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  buildEmoteGrid(q ? emoteList.filter(em => em.name.toLowerCase().includes(q)) : emoteList);
});

function applyEmotes(text) {
  return text.split(' ').map(w =>
    emoteMap[w]
      ? `<img class="emote" src="${emoteMap[w]}" alt="${w}" title="${w}" loading="lazy" />`
      : escHtml(w)
  ).join(' ');
}

/* ── emote picker toggle ── */
const emotePickerEl = document.getElementById('emote-picker');
const emoteBtnEl    = document.getElementById('emote-btn');
function closeEmotePicker() { emotePickerEl.classList.remove('open'); }
emoteBtnEl.addEventListener('click', e => { e.stopPropagation(); emotePickerEl.classList.toggle('open'); });
document.addEventListener('click', e => {
  if (!emotePickerEl.contains(e.target) && e.target !== emoteBtnEl) closeEmotePicker();
});

/* ═══════════════════════════════════════════
   CHAT RENDER
═══════════════════════════════════════════ */
const chatMsgsEl = document.getElementById('chat-messages');
let autoScroll   = true;

chatMsgsEl.addEventListener('scroll', () => {
  autoScroll = chatMsgsEl.scrollHeight - chatMsgsEl.scrollTop - chatMsgsEl.clientHeight < 60;
});
function scrollDown() { if (autoScroll) chatMsgsEl.scrollTop = chatMsgsEl.scrollHeight; }

function trimMsgs() {
  while (chatMsgsEl.children.length > MAX_MSGS) chatMsgsEl.removeChild(chatMsgsEl.firstChild);
}

function postSystem(text) {
  const el = document.createElement('div');
  el.className = 'chat-system'; el.textContent = text;
  chatMsgsEl.appendChild(el); trimMsgs(); scrollDown();
}

function postEvent(html) {
  const el = document.createElement('div');
  el.className = 'chat-event'; el.innerHTML = html;
  chatMsgsEl.appendChild(el); trimMsgs(); scrollDown();
}

function postMsg({ name, color, badges, body, highlight }) {
  const el = document.createElement('div');
  el.className = 'chat-msg'
    + (highlight ? ' highlight' : '');

  const badgeHtml = (badges || []).map(b => `<span class="badge">${b}</span>`).join('');
  const nameColor = isOryc ? 'var(--oryc)' : (color || colorFor(name));
  const bodyHtml  = applyEmotes(body);

  el.innerHTML = `${badgeHtml}<span class="name" style="color:${nameColor}">${escHtml(name)}</span><span class="body"> ${bodyHtml}</span>`;
  chatMsgsEl.appendChild(el); trimMsgs(); scrollDown();
}


/* ═══════════════════════════════════════════
   VIBE BUFFER
═══════════════════════════════════════════ */
const chatBuffer = [];
function addToBuffer(name, body) {
  chatBuffer.push({ name, body });
  if (chatBuffer.length > BUFFER_MAX) chatBuffer.shift();
}
function buildVibeContext() {
  if (!chatBuffer.length) return '';
  const density = chatBuffer.length >= 15 ? 'HIGH' : chatBuffer.length >= 7 ? 'MEDIUM' : 'LOW';
  return `\n\nSTREAM CHAT CONTEXT:\nDensity: ${density}\nRecent messages:\n` +
    chatBuffer.map(m => `${m.name}: ${m.body}`).join('\n');
}



// No Orycl for AstricAlex

/* ═══════════════════════════════════════════
   IRC PARSER
═══════════════════════════════════════════ */
function parseIRC(raw) {
  let tags = {}, prefix = '', command = '', params = [], i = 0;
  if (raw[0] === '@') {
    const sp = raw.indexOf(' ');
    raw.slice(1, sp).split(';').forEach(kv => {
      const eq = kv.indexOf('='); tags[kv.slice(0,eq)] = kv.slice(eq+1);
    });
    i = sp + 1;
  }
  if (raw[i] === ':') { const sp = raw.indexOf(' ',i); prefix = raw.slice(i+1,sp); i = sp+1; }
  const sp = raw.indexOf(' ', i);
  if (sp === -1) { command = raw.slice(i); }
  else {
    command = raw.slice(i, sp); i = sp+1;
    while (i < raw.length) {
      if (raw[i] === ':') { params.push(raw.slice(i+1)); break; }
      const s = raw.indexOf(' ', i);
      if (s === -1) { params.push(raw.slice(i)); break; }
      params.push(raw.slice(i,s)); i = s+1;
    }
  }
  return { tags, prefix, command, params };
}
function getNick(p) { return p.split('!')[0]; }
function getBadges(s) {
  if (!s) return [];
  const b = [];
  s.split(',').forEach(x => {
    if      (x.startsWith('broadcaster')) b.push('🎙');
    else if (x.startsWith('moderator'))   b.push('⚔️');
    else if (x.startsWith('subscriber'))  b.push('⭐');
    else if (x.startsWith('vip'))         b.push('💎');
  });
  return b;
}

/* ═══════════════════════════════════════════
   IRC — READER  (anon until user connects)
═══════════════════════════════════════════ */
let readerWs   = null;
let readerUser = '';   // set when user authenticates
let readerToken = '';
let isAuthed   = false;

const connDotEl    = document.getElementById('conn-dot');
const connectBtnEl = document.getElementById('connect-btn');
const chatInputEl  = document.getElementById('chat-input');
const sendBtnEl    = document.getElementById('send-btn');
const discBtnEl    = document.getElementById('disconnect-btn');

function setConnState(state) {
  connDotEl.className = '';
  if (state === 'connected') {
    connDotEl.classList.add('connected');
    connDotEl.title = isAuthed ? `Connected as ${readerUser}` : 'Connected (read-only)';
  } else if (state === 'error') {
    connDotEl.classList.add('error'); connDotEl.title = 'Connection error';
  } else {
    connDotEl.title = 'Disconnected';
  }
}

function setAuthedUI(authed) {
  isAuthed = authed;
  chatInputEl.disabled = !authed;
  sendBtnEl.disabled   = !authed;
  chatInputEl.placeholder = authed ? `Chat as ${readerUser}…` : 'Join the stream…';
  connectBtnEl.textContent = authed ? readerUser : 'Connect';
  connectBtnEl.className   = authed ? 'connected-state' : '';
  discBtnEl.className      = authed ? 'show' : '';
}

let readerReconnectTimer = null;
let readerReconnectDelay = 4000;

function scheduleReaderReconnect() {
  if (readerReconnectTimer) return;
  readerReconnectTimer = setTimeout(() => {
    readerReconnectTimer = null;
    readerReconnectDelay = Math.min(readerReconnectDelay * 1.5, 30000);
    if (document.visibilityState !== 'hidden') connectReader(readerUser, readerToken);
  }, readerReconnectDelay);
}

function connectReader(user, token) {
  if (readerReconnectTimer) { clearTimeout(readerReconnectTimer); readerReconnectTimer = null; }
  if (readerWs) { readerWs.close(); readerWs = null; }
  readerUser  = (user || '').toLowerCase();
  readerToken = token || '';
  readerReconnectDelay = 4000;

  readerWs = new WebSocket('wss://irc-ws.chat.twitch.tv:443');

  readerWs.onopen = () => {
    readerWs.send('CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership');
    if (readerToken && readerUser) {
      readerWs.send(`PASS ${readerToken.startsWith('oauth:') ? readerToken : 'oauth:' + readerToken}`);
      readerWs.send(`NICK ${readerUser}`);
    } else {
      readerWs.send('PASS SCHMOOPIIE');
      readerWs.send('NICK justinfan' + Math.floor(Math.random() * 80000 + 1000));
    }
    readerWs.send(`JOIN #${CHANNEL}`);
  };

  readerWs.onmessage = e => {
    e.data.split('\r\n').forEach(line => {
      if (!line) return;
      const msg = parseIRC(line);

      if (msg.command === 'PING') { readerWs.send('PONG :tmi.twitch.tv'); return; }

      if (msg.command === '001') {
        setConnState('connected');
        readerReconnectDelay = 4000; // reset backoff on successful connect
        if (readerToken && readerUser) {
          setAuthedUI(true);
          if (!sessionStorage.getItem('chat_connected_shown')) {
            postSystem(`connected as ${readerUser}`);
            sessionStorage.setItem('chat_connected_shown', '1');
          }
        } else {
          if (!sessionStorage.getItem('chat_anon_shown')) {
            postSystem('connected · read-only');
            sessionStorage.setItem('chat_anon_shown', '1');
          }
        }
        return;
      }

      if (msg.command === 'NOTICE') {
        const notice = msg.params[1] || '';
        // Login auth failed
        if (notice.includes('Login authentication failed') || notice.includes('Invalid NICK')) {
          postSystem('⚠ login failed — check your token');
          setAuthedUI(false);
        }
        return;
      }

      if (msg.command === 'PRIVMSG') {
        const name   = getNick(msg.prefix);
        const color  = msg.tags['color'] || null;
        const badges = getBadges(msg.tags['badges']);
        const body   = msg.params[1] || '';

        // Skip bot messages
        // no bot echo filter for Alex

        addToBuffer(name, body);
        const highlight = body.toLowerCase().includes(CHANNEL.toLowerCase());
        postMsg({ name, color, badges, body, highlight });
        return;
      }

      if (msg.command === 'USERNOTICE') {
        const stype = msg.tags['msg-id'];
        const dname = msg.tags['display-name'] || getNick(msg.prefix);
        if (stype === 'sub' || stype === 'resub') {
          postEvent(`⭐ <b>${escHtml(dname)}</b> subscribed!`);
        } else if (stype === 'subgift') {
          const recip = msg.tags['msg-param-recipient-display-name'] || '?';
          postEvent(`🎁 <b>${escHtml(dname)}</b> gifted a sub to <b>${escHtml(recip)}</b>`);
        } else if (stype === 'raid') {
          const count = msg.tags['msg-param-viewerCount'] || '?';
          postEvent(`🚀 <b>${escHtml(dname)}</b> is raiding with <b>${count}</b> viewers!`);
        }
        return;
      }

      if (msg.command === 'CLEARCHAT') {
        if (!msg.params[1]) postSystem('chat cleared by moderator');
        return;
      }
    });
  };

  readerWs.onerror  = () => setConnState('error');
  readerWs.onclose  = () => {
    setConnState('disconnected');
    const hasCreds = localStorage.getItem('alex_chat_user') && localStorage.getItem('alex_chat_token');
    if (hasCreds) scheduleReaderReconnect();
  };
}

// recentlySent removed — all messages flow through IRC for unified trigger handling

function sendChat(text) {
  if (!readerWs || readerWs.readyState !== WebSocket.OPEN || !isAuthed) return;
  readerWs.send(`PRIVMSG #${CHANNEL} :${text}`);
  // Don't render locally — let the IRC echo handle display and triggering
  // so there's one unified path for all messages including your own
}

/* ═══════════════════════════════════════════
   AUTH DRAWER — TWITCH OAUTH
   Implicit grant flow — redirects to Twitch,
   returns token in URL hash. No server needed.
═══════════════════════════════════════════ */
const authDrawer = document.getElementById('auth-drawer');

// Client ID fetched from CoCreate on load — never hardcoded in HTML.
// Redirect URI — must be registered in Twitch Developer app:
//   https://astricalex.github.io/app/stream/twitch_callback.html
let TWITCH_CLIENT_ID = '';
const TWITCH_CALLBACK = 'https://skidaggabatee.github.io/astrica/app/stream/twitch_callback.html';
const TWITCH_SCOPE    = 'chat:read chat:edit';

// Fetch Client ID from CoCreate on startup
fetch('https://cocreate-production.up.railway.app/api/twitch-client-id')
  .then(r => r.json())
  .then(d => { if (d.client_id) TWITCH_CLIENT_ID = d.client_id; })
  .catch(() => {}); // silent — will show error at click time if missing

let _oauthPopup = null;

function twitchOAuthLogin() {
  if (!TWITCH_CLIENT_ID) {
    postSystem('⚠ client ID not loaded — try again in a moment');
    return;
  }
  const state = Math.random().toString(36).slice(2);
  sessionStorage.setItem('twitch_oauth_state', state);
  const redirect = encodeURIComponent(TWITCH_CALLBACK);
  const scope    = encodeURIComponent(TWITCH_SCOPE);
  const url = `https://id.twitch.tv/oauth2/authorize`
    + `?client_id=${TWITCH_CLIENT_ID}`
    + `&redirect_uri=${redirect}`
    + `&response_type=token`
    + `&scope=${scope}`
    + `&state=${state}`;
  // Open in popup — main page stays intact
  const w = 520, h = 640;
  const left = Math.round(window.screenX + (window.outerWidth - w) / 2);
  const top  = Math.round(window.screenY + (window.outerHeight - h) / 2);
  _oauthPopup = window.open(url, 'twitch_oauth',
    `width=${w},height=${h},left=${left},top=${top},toolbar=no,menubar=no`);
}

// Called by twitch_callback.html via postMessage
window.addEventListener('message', (e) => {
  if (!['https://skidaggabatee.github.io'].includes(e.origin)) return;
  if (e.data?.type !== 'twitch_oauth') return;
  const { token, state } = e.data;
  if (!token) return;
  // Validate state
  const savedState = sessionStorage.getItem('twitch_oauth_state');
  if (savedState && state !== savedState) {
    postSystem('⚠ OAuth state mismatch — try again');
    return;
  }
  sessionStorage.removeItem('twitch_oauth_state');
  if (_oauthPopup) { _oauthPopup.close(); _oauthPopup = null; }
  // Validate token and get username
  fetch('https://id.twitch.tv/oauth2/validate', {
    headers: { 'Authorization': `OAuth ${token}` }
  }).then(r => r.json()).then(data => {
    const user = (data.login || '').toLowerCase();
    if (!user) { postSystem('⚠ could not validate token'); return; }
    localStorage.setItem('alex_chat_user',  user);
    localStorage.setItem('alex_chat_token', `oauth:${token}`);
    connectReader(user, `oauth:${token}`);
    authDrawer.classList.remove('open');
    postSystem(`✦ signed in as ${user}`);
  }).catch(() => postSystem('⚠ token validation failed'));
});

// checkOAuthCallback kept as no-op — callback now handled via postMessage
function checkOAuthCallback() { return false; }

connectBtnEl.addEventListener('click', () => {
  if (isAuthed) return;
  authDrawer.classList.add('open');
});

document.getElementById('auth-cancel').addEventListener('click', () => {
  authDrawer.classList.remove('open');
});

discBtnEl.addEventListener('click', () => {
  localStorage.removeItem('alex_chat_user');
  localStorage.removeItem('alex_chat_token');
  if (readerWs) { readerWs.close(); readerWs = null; }
  readerUser = ''; readerToken = '';
  setAuthedUI(false);
  setConnState('disconnected');
  // Reconnect as anon
  connectReader('', '');
  postSystem('disconnected');
});

sendBtnEl.addEventListener('click', () => {

});

function initPlayer() {
  const container = document.createElement('div');
  container.id = 'twitch-embed-inner';
  container.style.cssText = 'width:100%;height:100%;';
  document.getElementById('stream-wrap').appendChild(container);

  new Twitch.Embed('twitch-embed-inner', {
    width: '100%', height: '100%',
    channel: CHANNEL, parent: PARENT,
    layout: 'video',
    autoplay: false,  // avoid visibility-check block inside iframe
    muted: false,
  });
}



/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
window.addEventListener('load', () => {
  initPlayer();
  load7TV();

  // Check if returning from Twitch OAuth popup callback
  if (checkOAuthCallback()) return;

  // Load saved viewer creds — connect authed if present, anon if not
  const savedUser  = localStorage.getItem('alex_chat_user');
  const savedToken = localStorage.getItem('alex_chat_token');
  if (savedUser && savedToken) {
    connectReader(savedUser, savedToken);
  } else {
    // Start anon reader to show chat while not signed in
    connectReader('', '');
  }
});
